name: 🚀 Oráculo Auto-Sync & Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
    - name: 🌟 Checkout
      uses: actions/checkout@v4
    
    - name: 🐍 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 📦 Dependencias
      run: pip install -r requirements.txt
    
    - name: 🧪 Tests
      run: python -c "print('✅ Oráculo OK!')"
    
    - name: 🎉 Success
      run: echo "🧿 SYNC COMPLETADO!"